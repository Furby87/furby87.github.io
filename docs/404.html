<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden | Furby87</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="subpages.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--bg-color) !important;
            color: var(--text-main);
            overflow: hidden;
            margin: 0;
            padding: 0;
        }

        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        .error-container {
            max-width: 600px;
            padding: 40px;
            border-radius: 20px;
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }

        h1.glitch-title {
            font-size: clamp(4.5rem, 15vw, 8rem) !important;
            margin: 0;
            font-weight: 800;
            position: relative;
            color: var(--secondary) !important;
            text-shadow: 2px 2px 10px rgba(34, 211, 238, 0.4);
        }

        .error-desc {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--text-muted);
        }
    </style>
    <meta name="description" content="Hoppla! Die angeforderte Seite wurde nicht gefunden. Zurück zur Basis von Furby.">
    <!-- Open Graph SEO & Favicon -->
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🤖</text></svg>">
    <meta property="og:type" content="website">
    <meta property="og:title" content="404 - Seite nicht gefunden | Furby87">
    <meta property="og:description"
        content="Die angeforderte Datei wurde im Mainframe nicht gefunden. Hier geht es zurück zum Portfolio.">
    <meta property="og:image" content="https://avatars.githubusercontent.com/u/6781054?v=4">
    <meta name="theme-color" content="#000000">
</head>

<body>
    <div class="main-wrapper">
        <div class="error-container glass">
            <h1 class="glitch-title" data-value="404">404</h1>
            <h2 class="text-gradient">Seite nicht gefunden</h2>
            <p class="error-desc">Hoppla! Es sieht so aus, als hättest du dich verlaufen. Diese Seite existiert nicht
                oder wurde verschoben.</p>
            <a href="index.html" class="btn btn-primary" style="display: inline-block; padding: 12px 24px;"><i
                    class="fas fa-home"></i> Zurück zur Basis</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
    <script src="script.js"></script>
</body>

</html>
