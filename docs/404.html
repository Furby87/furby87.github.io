<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Seite nicht gefunden | Furby87</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            background: var(--bg-dark);
            color: var(--text-main);
            overflow: hidden;
            margin: 0;
            padding: 0;
        }
        .main-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
        .error-container {
            max-width: 600px;
            padding: 40px;
            border-radius: 20px;
            position: relative;
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
            -webkit-backdrop-filter: blur(10px);
            backdrop-filter: blur(10px);
        }
        h1.glitch {
            font-size: 8rem;
            margin: 0;
            font-weight: 800;
            position: relative;
            color: var(--primary);
            text-shadow: 2px 2px 10px rgba(74, 144, 226, 0.4);
            animation: glitch 2s infinite;
        }
        @keyframes glitch {
            0% { transform: translate(0) }
            20% { transform: translate(-2px, 2px) }
            40% { transform: translate(-2px, -2px) }
            60% { transform: translate(2px, 2px) }
            80% { transform: translate(2px, -2px) }
            100% { transform: translate(0) }
        }
        .error-desc {
            font-size: 1.2rem;
            margin-bottom: 30px;
            color: var(--text-muted);
        }
    </style>
</head>
<body>
    <div class="main-wrapper">
        <div class="error-container glass">
            <h1 class="glitch">404</h1>
            <h2>Seite nicht gefunden</h2>
            <p class="error-desc">Hoppla! Es sieht so aus, als hättest du dich verlaufen. Diese Seite existiert nicht oder wurde verschoben.</p>
            <a href="index.html" class="btn btn-primary" style="display: inline-block; padding: 12px 24px;"><i class="fas fa-home"></i> Zurück zur sicheren Zone</a>
        </div>
    </div>

    <!-- Scripts -->
    <script src="config.js"></script>
</body>
</html>
